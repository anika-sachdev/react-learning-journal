<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    //   Component is just a piece of the website. Looking at the chatbot project we are trying to create, pieces of the website or components are the textbox and the send button at the top, the separate texts sent by the user and the bot.

    //So, when building websites, its better to split up the website into components so that we can work on a small piece of website at a time.

    //Component - Text Box and Button

    //Component name should start with a capital letter. Follow PascalCase or CamelCase as follows:

    function ChatInput()
    {
        // The component will return the HTML of the component.
        
        // Another way of doing this would be to use 'input /'instead of adding a closing tag. The backslash at the end means a self closing element.

        // You can only return one element at a time so wrap them inside a div element or use a fragment element.

        //Fragment allows us to group elements together without creating an extra div
        return(
        <> 
               
        <input type="text" placeholder="Send a message to chatbot" size="30"></input>
            <button>Send</button>
        
        </>
        );
    }

    function ChatMessage(props) // Or we can destructure here by usig {message,sender} instead of props as parameter.
    {
      //console.log(props);
      const message=props.message;
      const sender=props.sender;
      // const {message,sender}=props;
      // Shortcut for the two lines
      
      return(
        <div>
        {sender==='robot' && <img src="robot.png" width="50"/>}
        {message}
        {sender==='user' && <img src="user.png" width="50"/>}
        </div>
      );
      // && works in such a way that if the first argument is true, second one is executed.

  //     if(sender === 'robot')
  //   {
  //     return(
  //       <div>
  //         <img src="robot.png" width="50"/>
  //         {message}
  //       </div>
  //     );
  //   }
  //   else
  //   {
  //     return(
  //       <div>
  //         {message}
  //         <img src="user.png" width="50"/>
  //       </div>
  //     );
  //   }
  // }

    //  First, we created a Component for chat messages with just the text hello chatbot. Now, we need to change the text and image for other several messages. To do that, we created our own attribute called 'message' while calling the Component. To access it inside the Component definition, we use Props.

    //Every Component Definition has a function parameterr called Props. Props is an object. It contains all the attributes (like message) that we give to our Component.
  }
    //Props makes our component reusable.


    //To add a new chat message, we are manually typing a new chat message component. Instead of that, we can use Javascrip to generate these components.

    //To do that, the first step is to save the data. The data over her is the message and the sender. Use array to save them.

    //Each chat message component inside the array will be saved as an object. An object is used to group related items together.
   function App()
   {
     return(
        <>
          <ChatInput />
          <ChatMessage message="Hello Chatbot" sender="user"/>
          <ChatMessage message="Hello! How can i help you?" sender="robot"/>
          <ChatMessage message="Can you get me todays date?" sender="user"/>
          <ChatMessage message="Today is June 2" sender="robot"/>
        </>
   );
    }
        const container=document.querySelector('.js-container');
        const root=ReactDOM.createRoot(container).render(<App />);
    </script>
    // <!-- 
    // {ChatInput()}
    // <ChatInput />
    
    // The above two lines are both used to execute the Components. Use the second one since it looks like we made our ow Htm element from the ones given to us by HTML. 
     
    // The main idea of React is to create our own HTML elements and then use them to create our website.-->
  </body>
</html>
