<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

    function ChatInput()
    {
        return(
        <> 
               
        <input type="text" placeholder="Send a message to chatbot" size="30"></input>
            <button>Send</button>
        
        </>
        );
    }
    function ChatMessage(props)
    {
      const message=props.message;
      const sender=props.sender;

      return(
        <div>
        {sender==='robot' && <img src="robot.png" width="50"/>}
        {message}
        {sender==='user' && <img src="user.png" width="50"/>}
        </div>
      );
    }
   function App()
   {
    // map is a function of 
    const ChatMessages=[{
      message: 'Hello Chatbot',
      sender:'user',
      id:'id1'
    },{
      message:'Hello! How can i help you?',
      sender:'robot',
      id:'id2'
    },{
      message:'Can you get me todays date?',
      sender:'user',
      id:'id3'
    },
  {
    message:'Today is June 2',
    sender:'robot',
    id:'id4'
  }];
    
const chatMessageComponents = ChatMessages.map((chatMessage)=>{
  return(
    <ChatMessage 
    message={chatMessage.message}
    sender={chatMessage.sender} 
    key={chatMessage.id}/>
  );
})
//When we use an array to list elements on the page, we need to assign a unique id to each element. So, basically add another props to each called id and give a unique value to each.
return(
        <>
            <ChatInput />
            {chatMessageComponents}
        </>

);
    }
        const container=document.querySelector('.js-container');
        const root=ReactDOM.createRoot(container).render(<App />);
</script>
  </body>
</html>
